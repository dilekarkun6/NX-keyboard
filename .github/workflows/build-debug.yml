name: Build Debug APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Generate error report
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "Fix this error:"
            echo ""
            echo "==================================================================="
            echo ""
            if [ -f build.log ]; then
              cat build.log
            else
              echo "Build log was not generated - the build crashed before producing output."
            fi
            echo ""
            echo "==================================================================="
            echo "Commit:        ${{ github.sha }}"
            echo "Branch / ref:  ${{ github.ref }}"
            echo "Workflow run:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > error.txt
          echo "::error::Build failed. See the 'build-error-report' artifact for full log."

      - name: Upload error report
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-error-report
          path: error.txt
          retention-days: 30

      - name: Fail workflow if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload debug APK
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: nxkeyboard-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
