name: Build Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    name: Build & publish release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          fi

      - name: Build release APK
        id: build
        continue-on-error: true
        shell: bash
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log

      - name: Generate error report
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "Fix this error:"
            echo ""
            echo "==================================================================="
            echo ""
            if [ -f build.log ]; then
              cat build.log
            else
              echo "Build log was not generated - the build crashed before producing output."
            fi
            echo ""
            echo "==================================================================="
            echo "Commit:        ${{ github.sha }}"
            echo "Tag / ref:     ${{ github.ref }}"
            echo "Workflow run:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > error.txt
          echo "::error::Release build failed. See the 'release-build-error-report' artifact for full log."

      - name: Upload error report
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: release-build-error-report
          path: error.txt
          retention-days: 30

      - name: Fail workflow if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload release APK artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: nxkeyboard-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: steps.build.outcome == 'success' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
