name: Build Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    name: Build & publish release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          fi

      - name: Build release APK
        id: build
        continue-on-error: true
        shell: bash
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -o pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace --console=plain 2>&1 | tee build.log

      - name: Extract error
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          log_path = Path("build.log")
          out = ["Fix this error:", ""]

          if not log_path.exists():
              out.append("(no build log was produced)")
              Path("error.txt").write_text("\n".join(out))
              raise SystemExit(0)

          text = log_path.read_text(errors="replace")
          lines = text.splitlines()

          kotlin_errors = []
          for i, line in enumerate(lines):
              if re.match(r"^e: ", line) or re.search(r"error:", line, re.IGNORECASE):
                  kotlin_errors.append(line.rstrip())
                  if i + 1 < len(lines) and lines[i + 1].strip().startswith("^"):
                      kotlin_errors.append(lines[i + 1].rstrip())

          gradle_blocks = []
          i = 0
          while i < len(lines):
              if lines[i].startswith("FAILURE:"):
                  block = []
                  j = i
                  while j < len(lines) and not lines[j].startswith("BUILD FAILED") and not lines[j].startswith("* Get more help"):
                      block.append(lines[j].rstrip())
                      j += 1
                  gradle_blocks.append("\n".join(block).strip())
                  i = j
              i += 1

          if kotlin_errors:
              out.append("--- Compilation errors ---")
              out.extend(kotlin_errors[:80])
              out.append("")

          if gradle_blocks:
              out.append("--- Gradle failure ---")
              out.append(gradle_blocks[0])
              out.append("")

          if not kotlin_errors and not gradle_blocks:
              out.append("--- Last 80 lines of build log ---")
              out.extend(line.rstrip() for line in lines[-80:])

          Path("error.txt").write_text("\n".join(out) + "\n")
          PY
          echo "::error::Release build failed. Download the 'release-build-error' artifact."

      - name: Upload error
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: release-build-error
          path: error.txt
          retention-days: 30

      - name: Fail workflow if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Upload release APK artifact
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: nxkeyboard-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: steps.build.outcome == 'success' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
